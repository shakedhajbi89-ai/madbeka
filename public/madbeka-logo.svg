<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Madbeka">
  <!-- Rounded-square primary mark.
       Ink (#0F0E0C) base + WhatsApp-green corner cutout (top-right) +
       yellow sticker-tape strip + the Hebrew letter מ. The whole composition
       is the wordmark in icon form: it's literally a sticker on a wall. -->
  <rect x="0" y="0" width="512" height="512" rx="112" fill="#0F0E0C"/>
  <path d="M512 0 L512 140 Q512 140 372 0 Z" fill="#25D366"/>
  <text x="256" y="372"
        text-anchor="middle"
        font-family="'Karantina', 'Heebo', 'Arial Hebrew', 'Tahoma', sans-serif"
        font-weight="700"
        font-size="320"
        fill="#FFF8EC"
        letter-spacing="-0.01em">מ</text>
  <g transform="translate(256 70) rotate(-6) translate(-90 -16)">
    <rect x="0" y="0" width="180" height="32" rx="4"
          fill="#F4C430"
          stroke="#FFF8EC"
          stroke-width="3"/>
  </g>
</svg>
